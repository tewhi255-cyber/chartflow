version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chartflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-chartflow}
      MYSQL_USER: ${DB_USER:-chartflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chartflow_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chartflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chartflow-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-chartflow}
      DB_USER: ${DB_USER:-chartflow}
      DB_PASSWORD: ${DB_PASSWORD:-chartflow_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-chartflow-uploads}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@chartflow.com}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - chartflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chartflow-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - chartflow-net

volumes:
  mysql_data:
  uploads_data:

networks:
  chartflow-net:
    driver: bridge
